<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puerto Chopp - Karaoke</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .welcome-card {
      max-width: 400px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="welcome-card fade-in">
    <img src="assets/logo.jpg" alt="Logo" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--primary-color); margin-bottom: 2rem; box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);">
    
    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Puerto Chopp</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6;">Centro de Control del Sistema de Karaoke</p>
    
    <div style="display: grid; gap: 1rem; width: 100%;">
      <a href="client.html" class="btn" style="text-decoration: none; padding: 1.2rem; gap: 1rem;">
        <span class="material-symbols-rounded">person</span>
        <span>Interfaz de Cliente</span>
      </a>
      <a href="dj.html" class="btn" style="text-decoration: none; padding: 1.2rem; gap: 1rem; background: linear-gradient(135deg, #333, #1a1a1a); color: var(--primary-color); border: 1px solid var(--primary-color);">
        <span class="material-symbols-rounded">admin_panel_settings</span>
        <span>Panel de DJ</span>
      </a>
      <a href="screen.html" class="btn" style="text-decoration: none; padding: 1.2rem; gap: 1rem; background: linear-gradient(135deg, #00b3ff, #0055ff); color: white;">
        <span class="material-symbols-rounded">tv</span>
        <span>Pantalla Karaoke (TV)</span>
      </a>
      <a href="tables.html" class="btn" style="text-decoration: none; padding: 1.2rem; gap: 1rem; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);">
        <span class="material-symbols-rounded">qr_code_2</span>
        <span>Generador de Mesas QR</span>
      </a>
    </div>

    <div style="margin-top: 3rem; opacity: 0.5; font-size: 0.8rem;">
      <p>© 2026 Puerto Chopp Karaoke System</p>
    </div>
  </div>

  <script>
    // Lógica de Redirección Inteligente
    const urlParams = new URLSearchParams(window.location.search);
    const table = urlParams.get('table');

    if (table) {
      // Si tiene mesa en la URL, lo enviamos directo al cliente preservando el parámetro
      window.location.href = `client.html?table=${table}`;
    }
  </script>
</body>
</html>
